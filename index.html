<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NoctraShield Extension Updates</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, Segoe UI, system-ui, sans-serif; background: #090b10; color: #eef2f7; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 20% 20%, rgba(36, 115, 255, .22), transparent 34%), radial-gradient(circle at 80% 10%, rgba(25, 198, 149, .18), transparent 30%), #090b10; }
    main { width: min(860px, calc(100% - 32px)); padding: 40px 0; }
    h1 { margin: 0 0 12px; font-size: clamp(32px, 6vw, 64px); line-height: 1; letter-spacing: 0; }
    p { color: #b7c0ce; font-size: 17px; line-height: 1.6; }
    .panel { margin-top: 26px; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; background: rgba(13,18,28,.82); box-shadow: 0 24px 80px rgba(0,0,0,.35); overflow: hidden; }
    .row { display: grid; grid-template-columns: 180px 1fr; gap: 16px; padding: 16px 18px; border-top: 1px solid rgba(255,255,255,.08); }
    .row:first-child { border-top: 0; }
    .key { color: #7dd3fc; font-weight: 700; }
    code, a { color: #a7f3d0; overflow-wrap: anywhere; }
    a { text-decoration: none; }
    a:hover { text-decoration: underline; }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; gap: 6px; } }
  </style>
</head>
<body>
  <main>
    <h1>NoctraShield</h1>
    <p>Static update host for the Microsoft Edge CRX build.</p>
    <section class="panel" aria-label="Update metadata">
      <div class="row"><div class="key">Version</div><div>1.6.1</div></div>
      <div class="row"><div class="key">Extension ID</div><div><code>dfknljejlcgbnkbeeohgcpcicigmcdck</code></div></div>
      <div class="row"><div class="key">Update XML</div><div><a href="noctrashield/updates.xml">noctrashield/updates.xml</a></div></div>
      <div class="row"><div class="key">CRX</div><div><a href="noctrashield/NoctraShield.crx">noctrashield/NoctraShield.crx</a></div></div>
    </section>
  </main>
</body>
</html>
